<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Backlog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16151b; --panel:#1d1b23; --panel2:#26232d; --panel3:#2f2b37;
    --ink:#ece7df; --muted:#9a92a4; --faint:#6f6878;
    --line:rgba(255,255,255,.075); --line2:rgba(255,255,255,.13);
    --brand:#d98a3d; --urgent:#e8665b;
    --beaten:#62cf8c; --playing:#e8b14c; --never:#6d8fd0;
    --must:#62cf8c; --maybe:#e8b14c; --pass:#8a8294;
    --disp:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);
    -webkit-font-smoothing:antialiased;line-height:1.45;}
  .wrap{max-width:880px;margin:0 auto;padding:24px 18px 96px;}

  header{margin-bottom:6px}
  .titlerow{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
  h1{font-family:var(--disp);font-weight:800;letter-spacing:-.02em;
    font-size:clamp(32px,6.5vw,52px);line-height:.95;margin:0;}
  h1 .dot{color:var(--brand)}
  .total{font-family:var(--mono);font-size:13px;color:var(--muted);white-space:nowrap}
  .sub{color:var(--muted);font-size:14px;margin:8px 0 0;max-width:62ch}

  /* tabs */
  .tabs{display:flex;gap:4px;margin:20px 0 0;border-bottom:1px solid var(--line)}
  .tab{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:-.01em;
    background:none;border:0;color:var(--faint);padding:11px 16px;cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
  .tab:hover{color:var(--muted)}
  .tab.on{color:var(--ink);border-bottom-color:var(--brand)}
  .tab .n{font-family:var(--mono);font-size:11px;font-weight:400;color:var(--faint);margin-left:7px}

  .bar{height:12px;border-radius:7px;background:var(--panel2);overflow:hidden;display:flex;
    border:1px solid var(--line);margin-top:18px}
  .bar i{display:block;height:100%;transition:width .35s cubic-bezier(.4,0,.2,1)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:13px;font-family:var(--mono)}
  .legend span{display:inline-flex;align-items:center;gap:7px;color:var(--muted)}
  .legend b{color:var(--ink);font-weight:700}
  .sw{width:10px;height:10px;border-radius:3px;display:inline-block}

  .tools{position:sticky;top:0;z-index:5;background:var(--bg);
    padding:14px 0 12px;margin-top:16px;border-bottom:1px solid var(--line)}
  .search{width:100%;background:var(--panel);border:1px solid var(--line2);color:var(--ink);
    font-family:var(--body);font-size:15px;padding:11px 13px;border-radius:10px;outline:none}
  .search:focus{border-color:var(--brand)}
  .search::placeholder{color:var(--faint)}
  .row2{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
  .chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0}
  .chip{font-family:var(--mono);font-size:12px;padding:7px 11px;border-radius:999px;
    background:var(--panel);border:1px solid var(--line2);color:var(--muted);cursor:pointer;
    white-space:nowrap;transition:.15s}
  .chip:hover{color:var(--ink);border-color:var(--faint)}
  .chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink);font-weight:700}
  .chip.sale.on{background:var(--brand);border-color:var(--brand);color:#1b1206}
  .chip .c{opacity:.6;margin-left:5px}
  select{font-family:var(--mono);font-size:12px;background:var(--panel);color:var(--muted);
    border:1px solid var(--line2);border-radius:999px;padding:7px 9px;cursor:pointer;outline:none}

  ul{list-style:none;margin:0;padding:0}
  li.game{display:flex;align-items:center;gap:14px;padding:13px 4px;border-bottom:1px solid var(--line)}
  .meta{flex:1;min-width:0}
  .name{font-weight:600;font-size:15.5px;letter-spacing:-.01em;overflow-wrap:anywhere}
  .submeta{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin-top:3px;
    display:flex;gap:11px;flex-wrap:wrap;align-items:center}
  .submeta .rt{color:var(--muted)}
  .pill{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.02em}
  .pill.disc{background:var(--brand);color:#1b1206}
  .pill.sale{background:var(--panel3);color:var(--maybe)}
  .pill.sale.soon{background:rgba(232,102,91,.16);color:var(--urgent)}
  .strike{text-decoration:line-through;opacity:.5}

  li.game[data-status="beaten"] .name,li.game[data-status="must"] .name{color:var(--beaten)}
  li.game[data-status="playing"] .name,li.game[data-status="maybe"] .name{color:var(--playing)}
  li.game[data-status="never"] .name{color:var(--never)}
  li.game[data-status="pass"] .name{color:var(--pass);opacity:.7}

  .seg{display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;flex-shrink:0}
  .seg button{font-family:var(--mono);font-size:11px;border:0;background:var(--panel);
    color:var(--muted);padding:9px 11px;cursor:pointer;transition:.12s;border-left:1px solid var(--line)}
  .seg button:first-child{border-left:0}
  .seg button:hover{background:var(--panel3);color:var(--ink)}
  .seg button.on{color:var(--bg);font-weight:700}
  .seg button.s-beaten.on,.seg button.s-must.on{background:var(--beaten)}
  .seg button.s-playing.on,.seg button.s-maybe.on{background:var(--playing)}
  .seg button.s-never.on{background:var(--never)}
  .seg button.s-pass.on{background:var(--pass)}

  .empty{text-align:center;color:var(--faint);padding:50px 0;font-family:var(--mono);font-size:13px}

  .actions{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,var(--bg) 28%);
    padding:24px 18px 18px;z-index:10}
  .actions .inner{max-width:880px;margin:0 auto;display:flex;gap:10px;justify-content:flex-end}
  .btn{font-family:var(--body);font-weight:600;font-size:14px;padding:11px 18px;border-radius:10px;
    border:1px solid var(--line2);background:var(--panel2);color:var(--ink);cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--faint)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#1b1206}
  .btn.primary:hover{filter:brightness(1.07)}
  .btn.ghost{background:transparent;color:var(--muted)}

  .scrim{position:fixed;inset:0;background:rgba(8,7,11,.7);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:20;padding:18px}
  .scrim.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;
    max-width:640px;width:100%;max-height:84vh;display:flex;flex-direction:column;overflow:hidden}
  .modal h2{font-family:var(--disp);font-weight:700;font-size:22px;margin:0;padding:20px 22px 4px}
  .modal p{color:var(--muted);font-size:13px;margin:4px 22px 14px}
  .modal textarea{flex:1;min-height:240px;margin:0 22px;background:var(--bg);color:var(--ink);
    border:1px solid var(--line2);border-radius:10px;font-family:var(--mono);font-size:12.5px;
    padding:14px;resize:none;outline:none;line-height:1.6}
  .modal .mfoot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px 20px}

  .saved{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--beaten);color:#0c1f14;font-family:var(--mono);font-size:12px;font-weight:700;
    padding:8px 16px;border-radius:999px;opacity:0;transition:.3s;pointer-events:none;z-index:30}
  .saved.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:560px){
    li.game{flex-wrap:wrap}
    .seg{width:100%}
    .seg button{flex:1}
    .actions .inner{flex-direction:column}
    .btn{width:100%}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="titlerow">
      <h1>Backlog<span class="dot">.</span></h1>
      <div class="total" id="total"></div>
    </div>
    <p class="sub" id="sub"></p>
    <div class="tabs">
      <button class="tab on" data-tab="library">Library<span class="n" id="tn-library"></span></button>
      <button class="tab" data-tab="wishlist">Wishlist<span class="n" id="tn-wishlist"></span></button>
    </div>
    <div class="bar" id="bar"></div>
    <div class="legend" id="legend"></div>
  </header>

  <div class="tools">
    <input class="search" id="search" placeholder="Search…" autocomplete="off">
    <div class="row2">
      <div class="chips" id="chips"></div>
      <select id="sort"></select>
    </div>
  </div>

  <ul id="list"></ul>
  <div class="empty" id="empty" style="display:none">Nothing matches that filter.</div>
</div>

<div class="actions">
  <div class="inner">
    <button class="btn ghost" id="resetBtn">Reset this tab</button>
    <button class="btn primary" id="copyBtn">Build summary for Claude</button>
  </div>
</div>

<div class="scrim" id="scrim">
  <div class="modal">
    <h2>Summary for Claude</h2>
    <p>Copy this and paste it into the chat — I'll refine what to play and what to buy around it.</p>
    <textarea id="summary" readonly></textarea>
    <div class="mfoot">
      <button class="btn ghost" id="closeBtn">Close</button>
      <button class="btn primary" id="clipBtn">Copy to clipboard</button>
    </div>
  </div>
</div>
<div class="saved" id="saved">Saved</div>

let tab='library';
let store={library:{},wishlist:{}};
let filter='all', q='', sort='recent';

function loadKey(k){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):{};}catch(e){return {};} }
let saveTimer=null;
function save(){
  try{ localStorage.setItem(CFG[tab].key, JSON.stringify(store[tab])); flashSaved(); }
  catch(e){ console.error('save failed',e); }
}
function flashSaved(){const s=document.getElementById('saved');s.classList.add('show');
  clearTimeout(saveTimer);saveTimer=setTimeout(()=>s.classList.remove('show'),1100);}

function counts(){
  const c={tagged:0}; for(const st of CFG[tab].statuses) c[st]=0; c.untagged=0;
  const map=store[tab];
  for(const g of CFG[tab].data){const s=map[g.n]; if(s){c[s]=(c[s]||0)+1;c.tagged++;}else c.untagged++;}
  return c;
}

function renderHeader(){
  const cf=CFG[tab], n=cf.data.length, c=counts();
  document.getElementById('sub').textContent=cf.sub;
  document.getElementById('total').textContent=n+' games · '+c.tagged+' tagged';
  document.getElementById('tn-library').textContent=OWNED.length;
  document.getElementById('tn-wishlist').textContent=WISH.length;
  // bar
  const colors={beaten:'var(--beaten)',playing:'var(--playing)',never:'var(--never)',
    must:'var(--must)',maybe:'var(--maybe)',pass:'var(--pass)'};
  document.getElementById('bar').innerHTML=cf.statuses.map(st=>
    '<i style="width:'+(100*c[st]/n)+'%;background:'+colors[st]+'"></i>').join('');
  // legend
  let lg=cf.statuses.map(st=>'<span><i class="sw" style="background:'+colors[st]+'"></i>'+cf.labels[st]+' <b>'+c[st]+'</b></span>').join('');
  lg+='<span><i class="sw" style="background:var(--faint)"></i>Untagged <b>'+c.untagged+'</b></span>';
  document.getElementById('legend').innerHTML=lg;
}

  const cf=CFG[tab], c=counts(), map=store[tab];
  const num=k=>{ if(k==='all')return cf.data.length; if(k==='untagged')return c.untagged;
    if(k==='sale')return cf.data.filter(g=>'d'in g).length; return c[k]||0; };
  document.getElementById('chips').innerHTML=cf.chips.map(ch=>{
    const [k,lab,cls]=ch;
    return '<button class="chip'+(cls?' '+cls:'')+(filter===k?' on':'')+'" data-f="'+k+'">'+lab+'<span class="c">'+num(k)+'</span></button>';
  }).join('');
}

function renderSort(){
  document.getElementById('sort').innerHTML=CFG[tab].sorts.map(([v,l])=>
    '<option value="'+v+'"'+(sort===v?' selected':'')+'>'+l+'</option>').join('');
}

function visible(){
  const cf=CFG[tab], map=store[tab];
  let arr=cf.data.filter(g=>{
    const s=map[g.n]||'untagged';
    if(filter==='sale'){ if(!('d'in g))return false; }
    else if(filter!=='all' && filter!==s) return false;
    if(q && !g.n.toLowerCase().includes(q)) return false;
    return true;
  });
  const idx=new Map(cf.data.map((g,i)=>[g.n,i]));
  if(sort==='name') arr.sort((a,b)=>a.n.localeCompare(b.n));
  else if(sort==='rating') arr.sort((a,b)=>(b.r||0)-(a.r||0));
  else if(sort==='new') arr.sort((a,b)=>(b.y||0)-(a.y||0));
  else if(sort==='old') arr.sort((a,b)=>(a.y||9999)-(b.y||9999));
  else if(sort==='disc') arr.sort((a,b)=>(b.d||0)-(a.d||0));
  else if(sort==='sale') arr.sort((a,b)=>(a.s==null?999:a.s)-(b.s==null?999:b.s));
  else arr.sort((a,b)=>idx.get(a.n)-idx.get(b.n));
  return arr;
}

function renderList(){
  const cf=CFG[tab], map=store[tab], arr=visible();
  document.getElementById('empty').style.display=arr.length?'none':'block';
  document.getElementById('list').innerHTML=arr.map(g=>{
    const s=map[g.n]||'';
    const rt=g.r!=null?('★ '+g.r.toFixed(0)+'%'):'';
    const yr=g.y!=null?g.y:'';
    let extra='';
    if(tab==='wishlist'){
      if('d'in g) extra+='<span class="pill disc">-'+g.d+'%</span>';
      if('s'in g){ const soon=g.s<=3; extra+='<span class="pill sale'+(soon?' soon':'')+'">ends in '+g.s+'d</span>'; }
    }
    const seg=cf.statuses.map(st=>
      '<button class="s-'+st+(s===st?' on':'')+'" data-name="'+enc(g.n)+'" data-set="'+st+'">'+cf.labels[st]+'</button>').join('');
    const price=(g.p&&g.p!=='—')?'<span'+('d'in g?' ':'')+'>'+esc(g.p)+'</span>':'';
    return '<li class="game"'+(s?(' data-status="'+s+'"'):'')+'>'+
      '<div class="meta"><div class="name">'+esc(g.n)+'</div>'+
      '<div class="submeta">'+(rt?'<span class="rt">'+rt+'</span>':'')+(yr?'<span>'+yr+'</span>':'')+price+extra+'</div></div>'+
      '<div class="seg">'+seg+'</div></li>';
  }).join('');
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function enc(s){return encodeURIComponent(s);}
function renderAll(){renderHeader();renderChips();renderSort();renderList();}

/* events */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  if(tab===t.dataset.tab)return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on'); tab=t.dataset.tab;
  filter='all'; q=''; sort='recent'; document.getElementById('search').value='';
  renderAll();
}));
document.getElementById('list').addEventListener('click',e=>{
  const b=e.target.closest('button[data-set]'); if(!b)return;
  const name=decodeURIComponent(b.dataset.name), set=b.dataset.set, map=store[tab];
  if(map[name]===set) delete map[name]; else map[name]=set;
  save(); renderAll();
});
document.getElementById('chips').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return; filter=b.dataset.f; renderAll();
});
let qTimer=null;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(qTimer); qTimer=setTimeout(()=>{q=e.target.value.trim().toLowerCase();renderList();},120);
});
document.getElementById('sort').addEventListener('change',e=>{sort=e.target.value;renderList();});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(confirm('Clear every tag on the '+tab+' tab? This can\'t be undone.')){store[tab]={};save();renderAll();}
});

/* summary — always covers both tabs */
function group(map,data,keys){const g={};keys.forEach(k=>g[k]=[]);for(const it of data){const s=map[it.n];if(s&&g[s])g[s].push(it);}return g;}
function buildSummary(){
  const L=group(store.library,OWNED,['beaten','playing','never']);
  const W=group(store.wishlist,WISH,['must','maybe','pass']);
  const sec=(t,a,f)=> a.length?('\n=== '+t+' ('+a.length+') ===\n'+a.map(f).join('\n')+'\n'):'';
  const nm=x=>'• '+x.n;
  const nmp=x=>'• '+x.n+(('d'in x)?(' ('+x.p+', -'+x.d+'%'+(('s'in x)?(', ends in '+x.s+'d'):'')+')'):'');
  let out='MY GAME STATUS\n';
  out+='Library: '+OWNED.length+' owned — beaten '+L.beaten.length+', playing '+L.playing.length+', never started '+L.never.length+'\n';
  out+='Wishlist: '+WISH.length+' — must-buy '+W.must.length+', maybe '+W.maybe.length+', pass '+W.pass.length+'\n';
  out+='\n----- LIBRARY -----';
  out+=sec('BEATEN',L.beaten,nm)+sec('PLAYING / UNFINISHED',L.playing,nm)+sec('NEVER STARTED',L.never,nm);
  out+='\n----- WISHLIST -----';
  out+=sec('MUST-BUY',W.must,nmp)+sec('MAYBE',W.maybe,nmp)+sec('PASS',W.pass,nm);
  const tagged=L.beaten.length+L.playing.length+L.never.length+W.must.length+W.maybe.length+W.pass.length;
  if(!tagged) out+='\n(Nothing tagged yet on either tab.)';
  return out;
}
document.getElementById('copyBtn').addEventListener('click',()=>{
  document.getElementById('summary').value=buildSummary();
  document.getElementById('scrim').classList.add('show');
});
document.getElementById('closeBtn').addEventListener('click',()=>document.getElementById('scrim').classList.remove('show'));
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')e.currentTarget.classList.remove('show');});
document.getElementById('clipBtn').addEventListener('click',async()=>{
  const ta=document.getElementById('summary');ta.select();
  try{await navigator.clipboard.writeText(ta.value);}catch(e){document.execCommand('copy');}
  const b=document.getElementById('clipBtn'),t=b.textContent;b.textContent='Copied ✓';setTimeout(()=>b.textContent=t,1400);
});

/* boot */
store.library=loadKey(CFG.library.key);
store.wishlist=loadKey(CFG.wishlist.key);
renderAll();
</script>
</body>
